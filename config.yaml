# 应用配置文件（非敏感配置可以提交到仓库）

# Agent 配置
agent:
  model_name: "kimi-k2.5"
  temperature: 1.0
  verbose: true
  max_iterations: 10
  
# 工具配置
tools:
  enabled:
    - calculator
    - weather
  
  calculator:
    description: "数学计算工具"
    supported_operations:
      - add
      - multiply
      - subtract
      - divide
  
  weather:
    description: "天气查询工具"
    mock_data: true  # 是否使用模拟数据
    supported_cities:
      - 北京
      - 上海
      - 深圳
      - 杭州

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/agent.log"

# MCP 配置（非敏感部分）
mcp:
  timeout: 30
  retry_times: 3
  skip_initialize: true
